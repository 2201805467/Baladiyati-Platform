name: baladity
description: "منصة بلديتي - نظام البلاغات والخدمات البلدية في ليبيا"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # HTTP Client
  dio: ^5.7.0

  # Secure Storage (auth token)
  flutter_secure_storage: ^9.2.2

  # Maps & Location
  google_maps_flutter: ^2.5.0
  geolocator: ^11.0.0
  geocoding: ^2.2.0

  # Media
  image_picker: ^1.0.7
  url_launcher: ^6.3.0

  # UI / Fonts
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
